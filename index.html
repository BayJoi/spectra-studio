<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spectra Studio</title>
    <meta name="description" content="Spectra Studio" />
    <meta name="robots" content="index, follow" />
    <meta property="og:title" content="Spectra Studio" />
    <meta property="og:description" content="Spectra Studio" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Spectra Studio" />
    <meta name="twitter:description" content="Spectra Studio" />
    <!-- CSP: 'unsafe-inline' in script-src is required for Vite HMR in dev; strip it in production builds -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' blob: data:; style-src 'self' 'unsafe-inline'; font-src 'self'; script-src 'self' 'unsafe-inline'; connect-src 'self' ws://localhost:* wss://localhost:*; worker-src 'self' blob:; form-action 'none'; base-uri 'self'; object-src 'none'">
    <script>if (window.self !== window.top) window.top.location = window.self.location;</script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preload" href="/fonts/jetbrains-mono-latin-800.woff2" as="font" type="font/woff2" crossorigin />
    <style>
      @font-face{font-family:'JetBrains Mono';font-style:normal;font-weight:800;font-display:swap;src:url(/fonts/jetbrains-mono-latin-800.woff2) format('woff2')}
      body{background:#0a0a0a;margin:0}#root{min-height:100vh;opacity:0;transition:opacity .45s ease}#root.ready{opacity:1}
      #splash{position:fixed;inset:0;background:#0a0a0a;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .45s ease;pointer-events:none}
      #splash.fade{opacity:0}
      .spinner{width:22px;height:22px;border:2px solid #2a2a2a;border-top-color:#b85c2a;border-radius:50%;animation:spin .7s linear infinite;margin-bottom:14px}
      @keyframes spin{to{transform:rotate(360deg)}}
      .splash-label{color:#555;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:.4em;text-transform:uppercase}
    </style>
  </head>
  <body>
    <div id="splash"><div class="spinner"></div><div class="splash-label">Spectra Studio</div></div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
